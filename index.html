<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数学动态交互</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #edf3f8;
      color: #172033;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.65;
    }
    main {
      width: min(960px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 42px 0;
    }
    .card {
      background: #fff;
      border: 1px solid #d8e2ef;
      border-radius: 16px;
      box-shadow: 0 18px 46px rgba(15, 23, 42, 0.12);
      padding: 30px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: 0;
    }
    .sub {
      margin: 0 0 26px;
      color: #66748a;
      font-size: 17px;
    }
    section {
      border-top: 1px solid #edf2f7;
      padding-top: 22px;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 24px;
      letter-spacing: 0;
    }
    a {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 800;
    }
    a:hover {
      text-decoration: underline;
    }
    .item {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 18px;
      padding: 16px;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      background: #f8fbff;
    }
    .item img {
      width: 160px;
      border-radius: 8px;
      border: 1px solid #d8e2ef;
      background: #fff;
    }
    .meta {
      color: #66748a;
      font-size: 15px;
      margin-top: 6px;
    }
    @media (max-width: 640px) {
      .item {
        grid-template-columns: 1fr;
      }
      .item img {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>数学动态交互</h1>
      <p class="sub">课堂用 HTML/SVG 动态演示目录。</p>

      <section>
        <h2>初二</h2>
        <div class="item">
          <a href="初二/2026年五三八下期末综合卷一/第26题第3问.html">
            <img src="初二/2026年五三八下期末综合卷一/第26题第3问-预览.png" alt="第26题第3问预览" />
          </a>
          <div>
            <a href="初二/2026年五三八下期末综合卷一/第26题第3问.html">
              2026年五三八下期末综合卷一：第26题第3问
            </a>
            <div class="meta">点 P 沿折线 ADC 运动，动态展示 BP 的垂直平分线、E 点、AE 与 BE。</div>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
